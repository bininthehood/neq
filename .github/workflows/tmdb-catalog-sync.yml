name: TMDB Catalog Sync

on:
  schedule:
    # 매일 08:00 UTC (TMDB Daily ID Export는 07:00 UTC 생성 완료)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      popularity_min:
        description: "popularity 최소값 (기본 1.0)"
        required: false
        default: "1.0"

concurrency:
  group: tmdb-catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run tmdb-catalog-sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_POPULARITY_MIN: ${{ inputs.popularity_min || '1.0' }}
        run: npx tsx scripts/tmdb-catalog-sync.ts
