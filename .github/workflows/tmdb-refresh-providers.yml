name: TMDB Refresh Providers

on:
  schedule:
    # 매일 09:00 UTC (refresh-stale 08:30 직후, bulk-crawl 6시간 cron 이 비우는 cadence).
    # tmdb_metadata.providers_fetched_at < NOW() - 30 days 인 row 1000건을 큐에 추가.
    # parity 측정 (2026-05-08): 30일 TTL 로 divergence 8% 이내 유지 가능 (선형 추정).
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      providers_ttl_days:
        description: "providers TTL 기준 일수 (기본 30)"
        required: false
        default: "30"
      batch_size:
        description: "1회 추가 배치 크기 (기본 1000)"
        required: false
        default: "1000"

concurrency:
  group: tmdb-refresh-providers
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run tmdb-refresh-providers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROVIDERS_TTL_DAYS: ${{ inputs.providers_ttl_days || '30' }}
          BATCH_SIZE: ${{ inputs.batch_size || '1000' }}
        run: npx tsx scripts/tmdb-refresh-providers.ts
