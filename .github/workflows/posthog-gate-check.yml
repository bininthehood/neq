name: PostHog Gate Check

on:
  schedule:
    # 매일 09:00 UTC (한국 18:00) — W5 게이트 4지표 점검
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: posthog-gate-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run gate check
        env:
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: npx tsx scripts/posthog-gate-check.ts

      - name: Comment on tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GATE_TRACKING_ISSUE: ${{ vars.GATE_TRACKING_ISSUE }}
        run: |
          if [ -z "$GATE_TRACKING_ISSUE" ]; then
            echo "::warning::GATE_TRACKING_ISSUE variable not set — skipping issue comment"
            echo "----- RESULT -----"
            cat posthog-gate-result.md
            exit 0
          fi
          gh issue comment "$GATE_TRACKING_ISSUE" --body-file posthog-gate-result.md
