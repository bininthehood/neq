name: Notifications - Monthly Report

on:
  schedule:
    # 매월 1일 09:00 KST = 1일 00:00 UTC.
    # 지난 달 watch_reports + saved_items 집계 → 사용자별 월간 리포트 push.
    # spec: _workspace/notification-triggers-detail.md §4
    - cron: "0 0 1 * *"
  workflow_dispatch:

concurrency:
  group: notif-monthly-report
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Call cron endpoint
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$PROD_URL/api/cron/notifications/monthly-report"
