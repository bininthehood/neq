name: TMDB Bulk Crawl

on:
  schedule:
    # Phase 2 본격 시작 전 임시: 6시간 간격(월 ~180분). 큐 비어있는 동안 Actions 예산 보호.
    # initial-crawl 실행 후 1시간 간격(`15 * * * *`)으로 복원할 것.
    - cron: "15 */6 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "1회 실행 배치 크기 (기본 2000)"
        required: false
        default: "2000"
      rate_limit_rps:
        description: "TMDB rate limit req/s (기본 30)"
        required: false
        default: "30"

concurrency:
  group: tmdb-bulk-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run tmdb-bulk-crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_BULK_BATCH: ${{ inputs.batch_size || '2000' }}
          TMDB_RATE_LIMIT_RPS: ${{ inputs.rate_limit_rps || '30' }}
        run: npx tsx scripts/tmdb-bulk-crawl.ts
