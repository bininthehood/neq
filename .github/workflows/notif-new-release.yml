name: Notifications - New Release

on:
  schedule:
    # 매일 10:00 KST = 01:00 UTC.
    # 4종 트리거 통합 (saved 시리즈 새 시즌 / 감독·배우 신작 / 구독 OTT 신작).
    # 사용자당 일일 최대 1건.
    # spec: _workspace/notification-triggers-detail.md §2
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: notif-new-release
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Call cron endpoint
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$PROD_URL/api/cron/notifications/new-release"
