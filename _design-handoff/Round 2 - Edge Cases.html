<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Round 2 — Edge Cases</title>
<link rel="stylesheet" href="system/colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #1a1815; color: #EDEDEF; font-family: 'Pretendard Variable', system-ui, sans-serif; min-height: 100vh; }
  *, *::before, *::after { box-sizing: border-box; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="illustrations.jsx"></script>
<script type="text/babel" src="neko-edge-cases.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, IOSDevice, NekoEdgeCases } = window;
const E = NekoEdgeCases;

const PHONE_W = 402;
const PHONE_H = 874;

function Phone({ children }) {
  return (
    <IOSDevice width={PHONE_W} height={PHONE_H} dark={true}>
      <div style={{ width: '100%', height: '100%', paddingTop: 48 }}>
        {children}
      </div>
    </IOSDevice>
  );
}

function App() {
  return (
    <DesignCanvas>
      {/* ─────────────────────────────────── */}
      <DCSection
        id="loading"
        title="01 · Loading"
        subtitle="Skeleton + spinner 시스템. 4가지 컨텍스트: 초기 진입 / Saved 리스트 / Detail 시트 / Saved 동기화 (논블로킹)."
      >
        <DCArtboard id="load-discover" label="1A — Initial Discover · 첫 진입 후 카드 페치" width={PHONE_W} height={PHONE_H}>
          <Phone><E.LoadingDiscover/></Phone>
        </DCArtboard>
        <DCArtboard id="load-saved" label="1B — Saved List · 그리드 skeleton" width={PHONE_W} height={PHONE_H}>
          <Phone><E.LoadingSaved/></Phone>
        </DCArtboard>
        <DCArtboard id="load-detail" label="1C — Detail Sheet · morph 후 본문 로딩" width={PHONE_W} height={PHONE_H}>
          <Phone><E.LoadingDetail/></Phone>
        </DCArtboard>
        <DCArtboard id="load-sync" label="1D — Saved Sync · 다른 기기와 동기화 (논블로킹)" width={PHONE_W} height={PHONE_H}>
          <Phone><E.LoadingSavedSync/></Phone>
        </DCArtboard>
      </DCSection>

      {/* ─────────────────────────────────── */}
      <DCSection
        id="network"
        title="02 · Network · Offline"
        subtitle="연결 상태별 3단계: 캐시 있음(배너) / 캐시 없음(풀 에러) / 부분 실패(이미지 폴백)."
      >
        <DCArtboard id="net-offline" label="2A — Offline Banner · 캐시된 저장 작품 표시" width={PHONE_W} height={PHONE_H}>
          <Phone><E.OfflineBanner/></Phone>
        </DCArtboard>
        <DCArtboard id="net-error" label="2B — Full Error · 503 / 캐시 없음" width={PHONE_W} height={PHONE_H}>
          <Phone><E.NetworkErrorFull/></Phone>
        </DCArtboard>
        <DCArtboard id="net-image" label="2C — Image Failed · 타이포그래픽 폴백" width={PHONE_W} height={PHONE_H}>
          <Phone><E.ImageFailedCard/></Phone>
        </DCArtboard>
      </DCSection>

      {/* ─────────────────────────────────── */}
      <DCSection
        id="exhausted"
        title="03 · Exhausted · 오늘의 5선 끝"
        subtitle='끝맺음 우선. "더 보기" 옵션은 인지부담을 명시적으로 표시.'
      >
        <DCArtboard id="exh-today" label="3A — Today Complete · 끝맺음 + 통계 + 내일 안내" width={PHONE_W} height={PHONE_H}>
          <Phone><E.ExhaustedToday/></Phone>
        </DCArtboard>
        <DCArtboard id="exh-extra" label="3B — Bonus Card · '더 보기' 선택 후 (피로 마커)" width={PHONE_W} height={PHONE_H}>
          <Phone><E.ExhaustedExtra/></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
